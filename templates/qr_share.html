<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypt to QR | Emojicrypt 🤫</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Emojicrypt 🤫</h1>
            <nav>
                <a href="{{ url_for('encrypt_page') }}">Encrypt Text</a>
                <a href="{{ url_for('decrypt_page') }}">Decrypt Text</a>
                <a href="{{ url_for('qr_share_page') }}" class="active">Encrypt to QR</a>
                <a href="{{ url_for('image_encrypt_page') }}">Encrypt Image</a>
                <a href="{{ url_for('image_decrypt_page') }}">Decrypt Image</a>
                <a href="{{ url_for('scanner_decrypt_page') }}">Scan & Decrypt</a>
            </nav>
        </header>
        <main class="converter single-view">
            <div class="box">
                <h2>Encrypt Text to QR Code</h2>
                <textarea id="text-input-qr" placeholder="Type your secret message here..."></textarea>
                <input type="password" id="qr-encrypt-password" placeholder="Enter a password">
                <button id="encrypt-qr-btn">Encrypt & Generate QR</button>
                <div class="qr-code-container" id="qr-code-result">
                    </div>
            </div>
        </main>
        <footer><p>Created by Ragul✨</p></footer>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
