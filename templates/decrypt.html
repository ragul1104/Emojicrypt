<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decrypt Text | Emojicrypt 🤫</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Emojicrypt 🤫</h1>
            <nav>
                <a href="{{ url_for('encrypt_page') }}">Encrypt Text</a>
                <a href="{{ url_for('decrypt_page') }}" class="active">Decrypt Text</a>
                <a href="{{ url_for('qr_share_page') }}">Encrypt to QR</a>
                <a href="{{ url_for('image_encrypt_page') }}">Encrypt Image</a>
                <a href="{{ url_for('image_decrypt_page') }}">Decrypt Image</a>
                <a href="{{ url_for('scanner_decrypt_page') }}">Scan & Decrypt</a>
            </nav>
        </header>

        <main class="converter single-view">
            <div class="box">
                <h2>Decrypt (Emoji to Text)</h2>
                <textarea id="emoji-input" placeholder="Paste your emoji code here..."></textarea>
                <input type="password" id="decrypt-password" placeholder="Enter the password">
                <button id="decrypt-btn">Decrypt Message</button>
                <div class="result-box" id="decryption-output"></div>
            </div>
        </main>
        <footer><p>Created by Ragul✨</p></footer>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
